format = """
[оӮ¶](fg:#bd93f9)\
$os\
$username\
[оӮ°](fg:#bd93f9 bg:#ff79c6)\
$directory\
[оӮ°](fg:#ff79c6 bg:#50fa7b)\
$git_branch\
$git_status\
[оӮ°](fg:#50fa7b)\
$fill\
$c\
$direnv\
$elixir\
$elm\
$golang\
$gradle\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$python\
$rust\
$scala\
$docker_context\
[оӮІ](fg:#bd93f9)\
$time\
$cmd_duration
уұһӘВ 
"""

command_timeout = 1000

[username]
show_always = true
style_user = "bg:#bd93f9 fg:#282a36"
style_root = "bg:#bd93f9 fg:#ff5555 bold"
format = '[$user ]($style)'
disabled = false

[os]
style = "bg:#bd93f9 fg:#282a36"
disabled = true 

[directory]
style = "bg:#ff79c6 fg:#282a36"
format = "[ пҒј $path ]($style)"
truncation_length = 10
truncation_symbol = "вҖҰ/"
read_only = 'рҹ”’'

[directory.substitutions]
"Documents" = "у°Ҳҷ "
"Downloads" = "пҖҷ "
"Music" = "пҖҒ "
"Pictures" = "пҖҫ "

[git_branch]
symbol = "пҗҳ"
style = "bg:#50fa7b fg:#282a36"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#50fa7b fg:#282a36"
format = '[$all_status$ahead_behind ]($style)'

[fill]
symbol = " "

[time]
disabled = false
time_format = "%R" 
style = "fg:#282a36 bg:#bd93f9"
format = '[ $time ]($style)'

[cmd_duration]
style = "fg:#f8f8f2 bg:#282a36"
format = "[took $duration]($style) "

[c]
symbol = "оҳһ "
style = "bg:#8be9fd fg:#282a36"
format = '[ $symbol ($version) ]($style)'

[elixir]
symbol = "оүө "
style = "bg:#8be9fd fg:#282a36"
format = '[ $symbol ($version) ]($style)'

[elm]
symbol = "оҳ¬ "
style = "bg:#8be9fd fg:#282a36"
format = '[ $symbol ($version) ]($style)'

[golang]
symbol = "оҳ§ "
style = "bg:#8be9fd fg:#282a36"
format = '[ $symbol ($version) ]($style)'

[gradle]
style = "bg:#8be9fd fg:#282a36"
format = '[ $symbol ($version) ]($style)'

[haskell]
symbol = "оқ· "
style = "bg:#8be9fd fg:#282a36"
format = '[ $symbol ($version) ]($style)'

[java]
