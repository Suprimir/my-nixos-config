style = "bg:#8be9fd fg:#282a36"
format = '[ $symbol ($version) ]($style)'

[julia]
symbol = "оҳӨ "
style = "bg:#8be9fd fg:#282a36"
format = '[ $symbol ($version) ]($style)'

[nodejs]
